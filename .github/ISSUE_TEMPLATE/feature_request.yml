name: Feature request
description: Propose a focused improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Russian or English is welcome. Explain the user problem before prescribing an implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what the user should see and how defaults should behave.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and compatibility concerns
      description: Mention existing settings, firmware differences, or risks to Android 11 users.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and current settings.
          required: true
        - label: This request does not include personal data or copyrighted media uploads.
          required: true
